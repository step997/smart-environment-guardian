<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能环境哨兵 · Smart Environment Guardian</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    rgba(255,255,255,0.07);
    --accent:    #58a6ff;
    --text:      #e6edf3;
    --text-dim:  #8b949e;
    --green:     #3fb950;
    --orange:    #d29922;
    --red:       #f85149;
    --blue:      #58a6ff;
    --radius:    14px;
    --blur:      16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- animated grid background ---- */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(88,166,255,0.07) 0%, transparent 70%);
    top: -200px; right: -150px;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1120px;
    margin: 0 auto;
    padding: 30px 24px 48px;
  }

  /* ---- glass card ---- */
  .card {
    background: rgba(22,27,34,0.72);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.30);
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  /* ---- header ---- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    margin-bottom: 10px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #3fb950);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    box-shadow: 0 0 20px rgba(88,166,255,0.25);
  }
  .header h1 {
    font-size: 1.35rem; font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }

  /* connection indicator */
  .conn {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.78rem; font-weight: 600;
    background: rgba(63,185,80,0.10);
    border: 1px solid rgba(63,185,80,0.25);
    color: var(--green);
  }
  .conn .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  .conn.error {
    background: rgba(248,81,73,0.10);
    border-color: rgba(248,81,73,0.25);
    color: var(--red);
  }
  .conn.error .pulse { background: var(--red); box-shadow: 0 0 6px var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* ---- comfort status bar ---- */
  .status-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-radius: 10px;
    margin-bottom: 24px;
    font-size: 0.9rem; font-weight: 600;
    border: 1px solid;
    animation: fadeSlide 0.4s ease-out;
  }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .status-bar.comfort {
    background: rgba(63,185,80,0.08);
    border-color: rgba(63,185,80,0.22);
    color: var(--green);
  }
  .status-bar.warm {
    background: rgba(210,153,34,0.08);
    border-color: rgba(210,153,34,0.22);
    color: var(--orange);
  }
  .status-bar.danger {
    background: rgba(248,81,73,0.08);
    border-color: rgba(248,81,73,0.22);
    color: var(--red);
  }
  .status-bar.cool {
    background: rgba(88,166,255,0.08);
    border-color: rgba(88,166,255,0.22);
    color: var(--blue);
  }
  .status-bar .status-icon { font-size: 1.3rem; flex-shrink: 0; }
  .status-bar .status-spacer { flex: 1; }
  .status-bar .status-extra { font-size: 0.78rem; font-weight: 400; opacity: 0.8; }

  /* ---- metric row ---- */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .metric-card {
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: background 0.6s ease;
  }
  .metric-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 3px 3px 0 0;
  }
  .metric-card.temp-card::before { background: #ff6b6b; }
  .metric-card.humi-card::before { background: var(--accent); }

  /* card background color levels */
  .metric-card.temp-blue   { background: rgba(88,166,255,0.12); }
  .metric-card.temp-green  { background: rgba(63,185,80,0.10); }
  .metric-card.temp-orange { background: rgba(210,153,34,0.12); }
  .metric-card.temp-red    { background: rgba(248,81,73,0.12); }

  .metric-card.humi-dry    { background: rgba(139,148,158,0.12); }
  .metric-card.humi-comfort { background: rgba(63,185,80,0.10); }
  .metric-card.humi-humid  { background: rgba(210,153,34,0.12); }
  .metric-card.humi-wet    { background: rgba(248,81,73,0.12); }

  /* blink breathing */
  @keyframes blinkBorder {
    0%, 100% { border-color: rgba(248,81,73,0.4); }
    50%      { border-color: rgba(248,81,73,1.0); }
  }
  .metric-card.blink {
    animation: blinkBorder 1.5s ease-in-out infinite;
  }

  .metric-label {
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 2.5px; color: var(--text-dim);
    margin-top: 4px; margin-bottom: 8px;
  }
  .metric-body {
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .metric-value {
    font-size: 4.2rem; font-weight: 800; line-height: 1.05;
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
  }
  .metric-value.temp-val { color: #ff6b6b; }
  .metric-value.humi-val { color: var(--accent); }
  .metric-unit {
    font-size: 1.1rem; font-weight: 500; color: var(--text-dim);
    align-self: flex-end; margin-bottom: 10px;
  }

  /* arrow indicator */
  .arrow {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    font-size: 0.8rem; font-weight: 700;
    margin-left: 6px;
    align-self: center;
    transition: background 0.3s, color 0.3s, transform 0.3s;
  }
  .arrow.up   { background: rgba(248,81,73,0.15); color: #ff6b6b; }
  .arrow.down { background: rgba(88,166,255,0.15); color: var(--accent); }
  .arrow.flat { background: rgba(139,148,158,0.1); color: var(--text-dim); }
  .arrow.pop { animation: popIn 0.35s ease-out; }
  @keyframes popIn {
    0%   { transform: scale(0.6); opacity: 0.3; }
    60%  { transform: scale(1.25); }
    100% { transform: scale(1); opacity: 1; }
  }

  .metric-range {
    font-size: 0.75rem; color: var(--text-dim); margin-top: 10px;
  }

  /* ---- chart section ---- */
  .chart-section { margin-bottom: 24px; }
  .chart-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
    font-size: 0.8rem; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .chart-wrapper { position: relative; height: 320px; }
  .chart-wrapper canvas { width: 100% !important; height: 100% !important; }

  /* ---- loading overlay ---- */
  .loading-mask {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    position: absolute; inset: 0;
    background: rgba(22,27,34,0.85);
    backdrop-filter: blur(6px);
    border-radius: var(--radius);
    z-index: 5;
    transition: opacity 0.4s;
  }
  .loading-mask.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.9rem; color: var(--text-dim); font-weight: 500; }

  /* ---- footer ---- */
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    font-size: 0.8rem; color: var(--text-dim);
  }
  .footer .ts {
    font-variant-numeric: tabular-nums;
    display: flex; align-items: center; gap: 6px;
  }
  .footer .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 0.73rem; font-weight: 600;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
  }

  /* ---- responsive ---- */
  @media (max-width: 640px) {
    .metric-value { font-size: 3rem; }
    .chart-wrapper { height: 250px; }
    .header h1 { font-size: 1.1rem; }
    .status-bar { font-size: 0.8rem; }
  }

  /* ---- AI assistant ---- */
  .ai-btn {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 9999;
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(102,126,234,0.45);
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex; align-items: center; justify-content: center;
  }
  .ai-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(102,126,234,0.60);
  }
  .ai-btn.pulse-ring::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(102,126,234,0.5);
    animation: ringPulse 2.2s ease-out infinite;
  }
  @keyframes ringPulse {
    0%   { transform: scale(1);   opacity: 0.8; }
    100% { transform: scale(1.45); opacity: 0; }
  }

  .ai-overlay {
    position: fixed; inset: 0;
    z-index: 10000;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .ai-overlay.open { opacity: 1; pointer-events: auto; }

  .ai-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: min(700px, 92vw);
    height: min(620px, 80vh);
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,0.50);
    transform: translateY(20px);
    transition: transform 0.3s;
  }
  .ai-overlay.open .ai-modal { transform: translateY(0); }

  .ai-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem; font-weight: 600;
  }
  .ai-modal-close {
    background: none; border: none;
    color: var(--text-dim); font-size: 1.3rem;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  .ai-modal-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  .ai-modal-body {
    flex: 1;
    position: relative;
    overflow: hidden;
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .ai-modal-body iframe {
    width: 100%; height: 100%;
    border: none;
  }

  @media (max-width: 640px) {
    .ai-btn { width: 48px; height: 48px; font-size: 1.3rem; bottom: 18px; right: 18px; }
    .ai-modal { height: 75vh; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">🛡️</div>
      <h1>智能环境<span>哨兵</span></h1>
    </div>
    <div class="conn" id="connIndicator">
      <span class="pulse"></span>
      <span id="connLabel">在线监测中</span>
    </div>
  </div>

  <!-- comfort status bar -->
  <div class="status-bar" id="statusBar">
    <span class="status-icon" id="statusIcon"></span>
    <span id="statusMsg">正在获取环境数据...</span>
    <span class="status-spacer"></span>
    <span class="status-extra" id="statusExtra"></span>
  </div>

  <!-- metric cards -->
  <div class="metrics-row">
    <div class="card metric-card temp-card" id="tempCard">
      <div class="metric-label">🌡️ 温度 Temperature</div>
      <div class="metric-body">
        <span class="metric-value temp-val" id="tempValue">--</span>
        <span class="arrow flat" id="tempArrow">—</span>
      </div>
      <div class="metric-unit" style="display:inline-block;margin-top:2px;">°C</div>
      <div class="metric-range">舒适区间 18°C ~ 26°C</div>
    </div>
    <div class="card metric-card humi-card" id="humiCard">
      <div class="metric-label">💧 湿度 Humidity</div>
      <div class="metric-body">
        <span class="metric-value humi-val" id="humiValue">--</span>
        <span class="arrow flat" id="humiArrow">—</span>
      </div>
      <div class="metric-unit" style="display:inline-block;margin-top:2px;">%RH</div>
      <div class="metric-range">舒适区间 40% ~ 70%</div>
    </div>
  </div>

  <!-- chart -->
  <div class="card chart-section">
    <div class="chart-header">
      <span>📈 温湿度趋势</span>
      <span>最近 20 条记录</span>
    </div>
    <div style="position:relative;">
      <div class="chart-wrapper">
        <canvas id="trendChart"></canvas>
      </div>
      <div class="loading-mask" id="loadingMask">
        <div class="spinner"></div>
        <div class="loading-text">数据积累中，请稍候...</div>
      </div>
    </div>
  </div>

  <!-- footer -->
  <div class="footer">
    <span class="ts" id="lastUpdate">--</span>
    <span class="pill" id="recordCount">0 条记录</span>
  </div>
</div>

<!-- AI Assistant -->
<button class="ai-btn pulse-ring" id="aiBtn" title="AI 助手">🤖</button>


<script>
(() => {
  /* ============ config ============ */
  const API_URL   = 'http://localhost:8000/api/latest';
  const POLL_MS   = 5000;
  const MAX_PTS   = 20;
  const MIN_PTS   = 5;   // loading mask visible below this

  // comfort thresholds
  const T_COMFORT_LO = 18, T_COMFORT_HI = 26;
  const H_COMFORT_LO = 40, H_COMFORT_HI = 70;
  const T_WARM_HI    = 32;
  const H_WARM_HI    = 85;

  /* ============ DOM refs ============ */
  const $  = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  const tempValueEl   = $('#tempValue');
  const humiValueEl   = $('#humiValue');
  const tempArrowEl   = $('#tempArrow');
  const humiArrowEl   = $('#humiArrow');
  const tempCardEl    = $('#tempCard');
  const humiCardEl    = $('#humiCard');
  const lastUpdateEl  = $('#lastUpdate');
  const recordCountEl = $('#recordCount');
  const connIndicator = $('#connIndicator');
  const connLabelEl   = $('#connLabel');
  const statusBarEl   = $('#statusBar');
  const statusIconEl  = $('#statusIcon');
  const statusMsgEl   = $('#statusMsg');
  const statusExtraEl = $('#statusExtra');
  const loadingMask   = $('#loadingMask');

  /* ============ state ============ */
  const history = [];
  let prevTemp = null;
  let prevHumi = null;
  let lastErrorShown = false;

  /* ============ helpers ============ */
  const fmtTime = (raw) => {
    try {
      const d = new Date(raw.replace(' ', 'T'));
      if (isNaN(d.getTime())) return raw;
      return d.toLocaleString('zh-CN', { hour12: false });
    } catch { return raw; }
  };

  const deltaArrow = (cur, prev) => {
    if (prev === null || cur === prev) return 'flat';
    return cur > prev ? 'up' : 'down';
  };

  const comfortClass = (t, h) => {
    // danger: temp > 32°C or humi > 85%
    if (t > T_WARM_HI || h > H_WARM_HI) return 'danger';
    // comfort: temp 18-26°C AND humi 40-70%
    if (t >= T_COMFORT_LO && t <= T_COMFORT_HI && h >= H_COMFORT_LO && h <= H_COMFORT_HI) return 'comfort';
    // warm: temp 26-32°C OR humi 70-85% (but not both comfort)
    if ((t > T_COMFORT_HI && t <= T_WARM_HI) || (h > H_COMFORT_HI && h <= H_WARM_HI)) return 'warm';
    return 'cool';
  };

  const comfortStatus = (t, h) => {
    const cls = comfortClass(t, h);
    switch (cls) {
    case 'comfort': return { icon: '✅', msg: '当前体感舒适', extra: `温度 ${t.toFixed(1)}°C · 湿度 ${h.toFixed(1)}%` };
    case 'warm': {
      const parts = [];
      if (t > T_COMFORT_HI) parts.push('温度偏高');
      if (h > H_COMFORT_HI) parts.push('湿度偏高');
      return { icon: '🌡️', msg: parts.join('，') + ' — 请注意通风降温', extra: `温度 ${t.toFixed(1)}°C · 湿度 ${h.toFixed(1)}%` };
    }
    case 'danger': {
      const parts = [];
      if (t > T_WARM_HI) parts.push('高温');
      if (h > H_WARM_HI) parts.push('高湿');
      if (parts.length === 0) parts.push('环境异常');
      return { icon: '🚨', msg: parts.join('、') + '，注意防暑！', extra: `温度 ${t.toFixed(1)}°C · 湿度 ${h.toFixed(1)}%` };
    }
    case 'cool': {
      const parts = [];
      if (t < T_COMFORT_LO) parts.push('温度偏低');
      if (h < H_COMFORT_LO) parts.push('湿度偏低');
      return { icon: '❄️', msg: (parts.length ? parts.join('，') : '环境偏冷') + ' — 请注意保暖加湿', extra: `温度 ${t.toFixed(1)}°C · 湿度 ${h.toFixed(1)}%` };
    }
    default: return { icon: '📡', msg: '监测中...', extra: '' };
    }
  };

  const tempCardClass = (t) => {
    if (t < T_COMFORT_LO) return 'temp-blue';
    if (t <= T_COMFORT_HI) return 'temp-green';
    if (t <= T_WARM_HI) return 'temp-orange';
    return 'temp-red';
  };

  const humiCardClass = (h) => {
    if (h < H_COMFORT_LO) return 'humi-dry';
    if (h <= H_COMFORT_HI) return 'humi-comfort';
    if (h <= H_WARM_HI) return 'humi-humid';
    return 'humi-wet';
  };

  /* ============ chart ============ */
  const ctx = $('#trendChart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        {
          label: '温度 °C',
          data: [],
          borderColor: '#ff6b6b',
          backgroundColor: 'rgba(255,107,107,0.06)',
          borderWidth: 2.2,
          pointRadius: 2.5,
          pointHoverRadius: 5,
          pointBackgroundColor: '#ff6b6b',
          tension: 0.35,
          fill: true,
          yAxisID: 'yTemp',
        },
        {
          label: '湿度 %',
          data: [],
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88,166,255,0.05)',
          borderWidth: 2.2,
          pointRadius: 2.5,
          pointHoverRadius: 5,
          pointBackgroundColor: '#58a6ff',
          tension: 0.35,
          fill: true,
          yAxisID: 'yHumi',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            color: '#8b949e',
            usePointStyle: true,
            pointStyleWidth: 8,
            padding: 20,
            font: { size: 11 },
          },
        },
        tooltip: {
          backgroundColor: 'rgba(13,17,23,0.94)',
          titleColor: '#e6edf3',
          bodyColor: '#c9d1d9',
          borderColor: 'rgba(255,255,255,0.10)',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            title: (ctx) => '🕐 ' + (history[ctx[0].dataIndex]?.ts ?? ''),
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#484f58', maxTicksLimit: 8, font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.035)' },
        },
        yTemp: {
          type: 'linear',
          position: 'left',
          title: { display: true, text: '温度 °C', color: '#ff6b6b', font: { size: 11, weight: '600' } },
          ticks: { color: '#ff6b6b', font: { size: 10 }, callback: (v) => v + '°' },
          grid: { color: 'rgba(255,107,107,0.08)' },
          min: 0,
          max: 45,
        },
        yHumi: {
          type: 'linear',
          position: 'right',
          title: { display: true, text: '湿度 %', color: '#58a6ff', font: { size: 11, weight: '600' } },
          ticks: { color: '#58a6ff', font: { size: 10 }, callback: (v) => v + '%' },
          grid: { drawOnChartArea: false },
          min: 0,
          max: 100,
        },
      },
    },
  });

  /* ============ UI updaters ============ */
  const updateArrow = (el, direction) => {
    el.classList.remove('up', 'down', 'flat', 'pop');
    void el.offsetWidth; // reflow
    el.classList.add(direction);
    if (direction !== 'flat') el.classList.add('pop');
    if (direction === 'up')    el.textContent = '▲';
    if (direction === 'down')  el.textContent = '▼';
    if (direction === 'flat')  el.textContent = '—';
  };

  const pushHistory = (ts, temp, humi) => {
    history.push({ ts, temp, humi });
    if (history.length > MAX_PTS) history.shift();

    chart.data.labels = history.map((p) => {
      const parts = p.ts.split(' ');
      return parts.length === 2 ? parts[1] : p.ts;
    });
    chart.data.datasets[0].data = history.map((p) => p.temp);
    chart.data.datasets[1].data = history.map((p) => p.humi);
    chart.update('none');

    // loading mask
    if (history.length >= MIN_PTS) {
      loadingMask.classList.add('hidden');
    } else {
      loadingMask.classList.remove('hidden');
    }

    recordCountEl.textContent = `${history.length} 条记录`;
  };

  const updateStatusBar = (temp, humi) => {
    const st = comfortStatus(temp, humi);
    statusBarEl.className = 'status-bar ' + comfortClass(temp, humi);
    statusIconEl.textContent = st.icon;
    statusMsgEl.textContent = st.msg;
    statusExtraEl.textContent = st.extra;
  };

  const updateDisplay = (data) => {
    const temp = Number(data.temp);
    const humi = Number(data.humi);
    const ts   = String(data.timestamp);

    const tOk = !isNaN(temp);
    const hOk = !isNaN(humi);

    // update big numbers
    tempValueEl.textContent = tOk ? temp.toFixed(1) : '--';
    humiValueEl.textContent = hOk ? humi.toFixed(1) : '--';

    // arrow animation
    if (tOk) {
      updateArrow(tempArrowEl, deltaArrow(temp, prevTemp));
      prevTemp = temp;
    }
    if (hOk) {
      updateArrow(humiArrowEl, deltaArrow(humi, prevHumi));
      prevHumi = humi;
    }

    // card background & blink
    if (tOk) {
      tempCardEl.className = 'card metric-card temp-card ' + tempCardClass(temp);
      if (temp > T_WARM_HI) tempCardEl.classList.add('blink');
    }
    if (hOk) {
      humiCardEl.className = 'card metric-card humi-card ' + humiCardClass(humi);
      if (humi > H_WARM_HI) humiCardEl.classList.add('blink');
    }

    // timestamp
    lastUpdateEl.textContent = `🕐 最后更新: ${fmtTime(ts)}`;

    // comfort status bar
    if (tOk && hOk) {
      updateStatusBar(temp, humi);
    }

    // chart history
    if (tOk && hOk) {
      pushHistory(ts, temp, humi);
    }

    // connection OK
    connIndicator.classList.remove('error');
    connLabelEl.textContent = '在线监测中';
    lastErrorShown = false;
  };

  const showError = (msg) => {
    if (lastErrorShown) return;
    lastErrorShown = true;
    connIndicator.classList.add('error');
    connLabelEl.textContent = '连接中断';
    lastUpdateEl.textContent = `⚠️ ${msg}`;
  };

  /* ============ fetch ============ */
  const fetchLatest = async () => {
    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      updateDisplay(json);
      return true;
    } catch (err) {
      console.warn('[dashboard]', err.message);
      showError(err.message);
      return false;
    }
  };

  /* ============ bootstrap ============ */
  fetchLatest();
  setInterval(fetchLatest, POLL_MS);


	/* ============ AI assistant ============ */
	const aiBtn  = document.getElementById('aiBtn');
	const BOT_URL = 'https://www.coze.cn/store/agent/7635605366902145062?bot_id=true';
	aiBtn.addEventListener('click', () => {
	  window.open(BOT_URL, '_blank', 'noopener');
	});
})();
</script>
